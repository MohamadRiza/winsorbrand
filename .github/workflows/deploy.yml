name: CI/CD Pipeline to Hostinger VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Verify Types (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create .env.local for build
        run: |
          cat > .env.local << 'EOF'
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
          EOF

      - name: Build Next.js
        run: npm run build

  deploy:
    name: Deploy to VPS (CD)
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy & Build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          script: |
            cd /var/www/winsorbrand || { echo "Directory not found!"; exit 1; }
            echo "Fetching latest changes..."
            git pull origin main
            echo "Installing dependencies..."
            npm ci --production=false
            echo "Building application..."
            npm run build
            echo "Restarting PM2..."
            pm2 restart winsorbrand
            pm2 save
            echo "Deployment completed successfully!"