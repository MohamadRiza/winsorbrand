name: CI/CD Pipeline to Hostinger VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Verify Types (CI)
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Types
        run: npx tsc --noEmit

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY || 'mock_key' }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'mock_key' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'mock_key' }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /

  deploy:
    name: Deploy to VPS (CD)
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy & Build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Navigate to project directory
            cd /var/www/winsorbrand || { echo "Directory /var/www/winsorbrand not found! Clone the repository first."; exit 1; }
            
            # Pull latest changes from git
            echo "Fetching latest changes..."
            git pull origin main
            
            # Install dependencies
            echo "Installing dependencies..."
            npm install
            
            # Build Next.js
            echo "Building application..."
            npm run build
            
            # Restart PM2 process
            echo "Restarting application under PM2..."
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            
            # Save PM2 state
            pm2 save
            
            echo "Deployment completed successfully!"
